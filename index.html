<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #282c34;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 350px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #4caf50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .chat-messages {
            height: 400px;
            padding: 15px;
            overflow-y: auto;
            background: #e5ddd5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 15px;
        }
        .my-message {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #f0f0f0;
            border-top: 1px solid #ccc;
        }
        #messageInput {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            outline: none;
            font-size: 15px;
            padding-left: 15px;
        }
        #sendBtn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #sendBtn:hover {
            background: #388e3c;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">My Chat App</div>
    <div class="chat-messages" id="messages">
        </div>
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn" onclick="displayLocalMessage()">Send</button>
    </div>
</div>

<script>
    // This function shows the message on your screen when you click Send
    function displayLocalMessage() {
        const input = document.getElementById('messageInput');
        const messageText = input.value;
        
        // Check if the input is not empty
        if (messageText.trim() !== '') {
            const messagesDiv = document.getElementById('messages');
            
            // Create a new message bubble
            const newMessage = document.createElement('div');
            newMessage.classList.add('message', 'my-message');
            newMessage.innerText = messageText;
            
            // Add it to the chat window
            messagesDiv.appendChild(newMessage);
            
            // Scroll to the bottom so you always see the newest message
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Clear the input box so you can type the next message
            input.value = '';
        }
    }

    // Allow pressing "Enter" on the keyboard to send the message
    document.getElementById("messageInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            displayLocalMessage();
        }
    });
</script>

</body>
</html>
